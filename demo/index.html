<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cesium Timeline - Test App</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
          'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans',
          'Helvetica Neue', sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
      }

      #root {
        width: 100%;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        padding: 16px;
        background: #1a1a1a;
        border-bottom: 1px solid #333;
      }

      .header h1 {
        font-size: 24px;
        margin-bottom: 8px;
      }

      .header p {
        font-size: 14px;
        color: #999;
      }

      .container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 16px;
        gap: 16px;
        overflow: hidden;
      }

      .timeline-wrapper {
        flex: 0 0 auto;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        overflow: hidden;
      }

      .info-panel {
        flex: 1;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 16px;
        overflow-y: auto;
        font-family: 'Monaco', 'Courier New', monospace;
        font-size: 12px;
      }

      .info-item {
        margin-bottom: 12px;
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 16px;
      }

      .info-label {
        color: #ff6b6b;
        font-weight: bold;
      }

      .info-value {
        color: #4ecdc4;
        word-break: break-all;
      }

      .controls-section {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid #333;
      }

      .controls-section h3 {
        color: #ff6b6b;
        margin-bottom: 8px;
        font-size: 12px;
        text-transform: uppercase;
      }

      button {
        background: #ff6b6b;
        color: #fff;
        border: none;
        padding: 8px 12px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 12px;
        margin-right: 8px;
        margin-bottom: 8px;
        transition: background 0.2s;
      }

      button:hover {
        background: #ff5252;
      }

      button:active {
        transform: scale(0.98);
      }

      .status-badge {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: bold;
        background: #333;
        color: #4ecdc4;
      }

      .status-badge.playing {
        background: #4ecdc4;
        color: #0f0f0f;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
